server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Always advertise to crawlers (incl. AI/LLM ones); nothing here is private.
    add_header X-Robots-Tag "all" always;

    # Sensible default security headers for a static site.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=(), browsing-topics=()" always;
    # Loose CSP — utteranc.es loads from its own origin and posts in an iframe.
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; script-src 'self' https://utteranc.es; frame-src https://utteranc.es; connect-src 'self' https://api.github.com https://raw.githubusercontent.com; font-src 'self' data:; base-uri 'self'; form-action 'self'" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/markdown
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Astro hashes asset filenames under /_astro/, so they're safe to cache forever.
    location ^~ /_astro/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Fonts ship as /_astro/* too, but cover the public/ fallback path.
    location ~* \.(woff2?|ttf|eot|ico|svg)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000" always;
        try_files $uri =404;
    }

    # Plain markdown mirrors of posts.
    location ~ ^/blog/.+\.md$ {
        default_type "text/markdown; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    # llms*.txt and robots.txt
    location ~ ^/(llms(-full)?\.txt|robots\.txt)$ {
        default_type "text/plain; charset=utf-8";
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    # HTML pages — short cache so deploys are visible quickly.
    location / {
        add_header Cache-Control "public, max-age=60, must-revalidate" always;
        try_files $uri $uri/ $uri.html $uri/index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
